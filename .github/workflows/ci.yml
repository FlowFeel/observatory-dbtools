name: CI — Observatory DB Tools

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.25'

jobs:
  # ================================================================
  # Fast gate: build + vet (no Docker, no containers)
  # ================================================================
  preflight:
    name: "Preflight: Build & Vet"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Build CLI
        run: CGO_ENABLED=0 go build -o dbtools ./cmd/dbtools

      - name: Smoke test
        run: ./dbtools

  # ================================================================
  # Contract tests: testcontainers against disposable MySQL
  # Golden file mismatches = build failure. Never auto-update in CI.
  # ================================================================
  contract-tests:
    name: "Contract Tests (testcontainers)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run contract tests
        run: go test -v -count=1 -timeout=300s -race ./pkg/...

      - name: Verify golden files unchanged
        run: |
          if ! git diff --quiet -- '*/testdata/*.json'; then
            echo "::error::Golden files were modified by test run."
            echo "Run 'go test -update ./pkg/...' locally and commit."
            git diff -- '*/testdata/*.json'
            exit 1
          fi

  # ================================================================
  # Docker image build verification
  # ================================================================
  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t observatory-dbtools:ci .

  # ================================================================
  # Lint: go vet + gofmt + gomod verify
  # ================================================================
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod/go.sum not tidy. Run 'go mod tidy' and commit."
            git diff go.mod go.sum
            exit 1
          fi
