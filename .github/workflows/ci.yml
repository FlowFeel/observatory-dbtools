name: CI — Observatory DB Tools

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  # ================================================================
  # Fast gate: build + vet (no Docker, no containers)
  # ================================================================
  preflight:
    name: "Preflight: Build & Vet"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Resolve dependencies
        run: go mod tidy

      - name: go vet
        run: go vet ./...

      - name: Build CLI
        run: CGO_ENABLED=0 go build -o dbtools ./cmd/dbtools

      - name: Smoke test
        run: ./dbtools

  # ================================================================
  # Contract tests: testcontainers against disposable MySQL
  # Golden file mismatches = build failure. Never auto-update in CI.
  # ================================================================
  contract-tests:
    name: "Contract Tests (testcontainers)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Resolve dependencies
        run: go mod tidy

      - name: Run contract tests
        run: go test -v -count=1 -timeout=300s -race ./pkg/...

      - name: Verify golden files unchanged
        run: |
          if ! git diff --quiet -- '*/testdata/*.json'; then
            echo "::error::Golden files were modified by test run."
            echo "Run 'go test -update ./pkg/...' locally and commit."
            git diff -- '*/testdata/*.json'
            exit 1
          fi

  # ================================================================
  # Docker image build verification
  # ================================================================
  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t observatory-dbtools:ci .

  # ================================================================
  # Lint (parallel with tests)
  # ================================================================
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Resolve dependencies
        run: go mod tidy

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
